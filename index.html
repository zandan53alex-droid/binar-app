<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuralEdge Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=17">
    <style>
        html,
        body {
            min-height: 100%;
        }

        body {
            background-image: url('./images/bg.jpg?v=888') !important;
            background-size: cover !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Removed TradingView for Pocket Option Fidelity -->
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-gold">TURBO</span><span class="logo-white">APP</span>
            </div>
            <div class="user-controls">
                <div class="user-status">
                    <span id="status-badge" class="badge">STANDARD</span>
                </div>
                <div class="lang-selector-container">
                    <button id="lang-toggle" class="lang-toggle-btn">
                        <span id="current-lang-icon">🇷🇺</span>
                    </button>
                    <div id="lang-dropdown" class="lang-dropdown">
                        <button class="lang-item" data-lang="ru">🇷🇺 Русский</button>
                        <button class="lang-item" data-lang="en">🇬🇧 English</button>
                        <button class="lang-item" data-lang="hi">🇮🇳 हिन्दी</button>
                        <button class="lang-item" data-lang="es">🇪🇸 Español</button>
                        <button class="lang-item" data-lang="fr">🇫🇷 Français</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" id="asset-search" placeholder="Search asset...">
        </div>

        <!-- Category Select -->
        <div class="category-dropdown-container">
            <button id="category-toggle" class="category-toggle-btn">
                <span id="current-category-name">CURRENCIES</span>
                <span class="dropdown-arrow">▼</span>
            </button>
            <div id="category-dropdown" class="category-dropdown">
                <button class="dropdown-item" data-category="forex">CURRENCIES</button>
                <button class="dropdown-item" data-category="forex_otc">CURRENCIES OTC</button>
                <button class="dropdown-item" data-category="crypto">CRYPTO</button>
                <button class="dropdown-item" data-category="stocks">STOCKS</button>
                <button class="dropdown-item" data-category="commodities">COMMODITIES</button>
                <button class="dropdown-item" data-category="indices">INDICES</button>
            </div>
        </div>

        <!-- Asset List Container -->
        <main id="asset-list" class="asset-grid">
            <!-- Asset cards will be injected here -->
            <div class="loader">SYNCING REAL-TIME DATA...</div>
        </main>
    </div>

    <!-- Signal Overlay -->
    <div id="signal-overlay" class="signal-overlay hidden">
        <div class="signal-card">
            <button id="close-signal" class="btn-close">×</button>

            <div class="asset-header">
                <div id="signal-asset-icons" class="signal-asset-icon-wrapper">
                    <!-- Icons injected via JS -->
                </div>
                <h2 id="signal-asset-name">--</h2>
            </div>

            <div class="timeframe-selection">
                <p class="section-label" id="label-expiration">SELECT EXPIRATION:</p>
                <div class="timeframes">
                    <button class="tf-btn" data-tf="3s">3s</button>
                    <button class="tf-btn" data-tf="5s">5s</button>
                    <button class="tf-btn" data-tf="15s">15s</button>
                    <button class="tf-btn" data-tf="30s">30s</button>
                    <button class="tf-btn active" data-tf="1m">1m</button>
                    <button class="tf-btn" data-tf="2m">2m</button>
                    <button class="tf-btn" data-tf="3m">3m</button>
                    <button class="tf-btn" data-tf="5m">5m</button>
                    <button class="tf-btn" data-tf="15m">15m</button>
                    <button class="tf-btn" data-tf="30m">30m</button>
                    <button class="tf-btn" data-tf="1h">1h</button>
                    <button class="tf-btn" data-tf="4h">4h</button>
                </div>
            </div>

            <div id="signal-init-view">
                <button id="get-signal-btn" class="btn-primary">GET SIGNAL</button>
            </div>

            <div id="signal-loader" class="neural-loader hidden">
                <div class="pulse-ring"></div>
                <p id="status-text">INITIALIZING...</p>
            </div>

            <div id="signal-content" class="hidden">
                <div class="signal-result">
                    <div id="signal-direction" class="direction">CALL</div>
                    <div class="expiration-info" id="expiration-label">EXPIRATION: 1m</div>
                    <div class="price-info">
                        ENTRY PRICE: <span id="entry-price">0.0000</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=16"></script>
</body>

</html>
